site_name: Portfolio Data Analyst – Yves Landry KAZONI
site_url: https://landryyves0-bit.github.io/portfolio-data-analyst-yves
theme:
  name: material
  language: fr
  logo: images/logo.png        # ajoute ton logo dans docs/images/
  favicon: images/favicon.ico  # ajoute une icône personnalisée
  features:
    - navigation.tabs
    - navigation.sections
    - content.code.copy
    - content.tabs.link
    - search.suggest
    - search.highlight
  palette:
    - scheme: default
      primary: indigo
      accent: deep orange
    - scheme: slate
      primary: teal
      accent: lime

nav:
  - Accueil: index.md
  - Projets: projets.md
  - Dashboards: dashboards.md
  - Scripts & Outils: scripts.md
  - Publications: publications.md

markdown_extensions:
  - admonition
  - codehilite
  - footnotes
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed
